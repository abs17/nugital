name: StaticCrypt Protection

on:
  push:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  protect:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g staticrypt

      - name: Generate protected HTML
        env:
          STATICCRYPT_PASSWORD: ${{ secrets.STATICCRYPT_PASSWORD }}
        run: |
          mkdir -p ./dist
          echo "🔐 Generating protected HTML with staticrypt..."
          staticrypt index.html -p "$STATICCRYPT_PASSWORD" -o ./dist/index.html
          echo "✅ Protected HTML generated!"
          ls -lah ./dist/
          echo "File content check:"
          head -20 ./dist/index.html
          # Copie les autres fichiers si nécessaire
          cp -r 03355b17f28b2816789cca747312d05c748d2777 ./dist/ 2>/dev/null || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          cname: abs17.github.io
