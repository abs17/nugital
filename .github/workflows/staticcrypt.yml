name: StaticCrypt Protection

on:
  push:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  protect:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g staticrypt

      - name: Generate protected HTML
        env:
          STATICCRYPT_PASSWORD: ${{ secrets.STATICCRYPT_PASSWORD }}
        run: |
          echo "🔐 Generating protected HTML with staticrypt..."
          # Remove any existing encrypted directory
          rm -rf encrypted/
          # Generate protected version (will create encrypted/ directory by default)
          staticrypt index.html -p "$STATICCRYPT_PASSWORD" --short
          echo "✅ Protected HTML generated!"
          echo "Checking generated files:"
          ls -lah encrypted/
          # Replace original index.html with protected version
          mv encrypted/index.html index.html
          rm -rf encrypted/
          echo "✅ Index.html updated with protection!"

      - name: Commit and push protected version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git pull origin main --rebase || true
          git add index.html
          git commit -m "chore: update protected version with latest content" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
